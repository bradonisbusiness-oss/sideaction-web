<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideAction | Track the action. Follow the story. Know who actually pays.</title>
  <meta name="description" content="SideAction keeps prop bets, side deals, proof, reminders, and payup status in one place so nobody has to guess what was agreed or keep chasing what they are owed." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0f16;
      --bg-soft: #101520;
      --card: #121826;
      --border: rgba(255,255,255,0.08);
      --text: #f7f9fc;
      --muted: #a6afc3;
      --accent: #6aa8ff;
      --accent-2: #82b8ff;
      --green: #2dd287;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(106,168,255,0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(45,210,135,0.08), transparent 28%),
        linear-gradient(180deg, #0b0f17 0%, #090c13 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 28px 64px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .brand img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand .accent {
      color: var(--accent);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 560px) minmax(320px, 1fr);
      gap: 72px;
      align-items: center;
      min-height: calc(100vh - 120px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(106,168,255,0.12);
      border: 1px solid rgba(106,168,255,0.18);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(44px, 7vw, 78px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 800;
      margin-bottom: 22px;
    }

    h1 .accent {
      color: var(--accent);
    }

    .subhead {
      font-size: 20px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 540px;
      margin-bottom: 28px;
    }

    .waitlist {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .waitlist input {
      flex: 1;
      min-width: 250px;
      padding: 17px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .waitlist input::placeholder {
      color: #7f88a0;
    }

    .waitlist button {
      padding: 17px 24px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(180deg, #79b5ff 0%, #4d9fff 100%);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(77,159,255,0.22);
    }

    .note {
      font-size: 13px;
      color: #7f88a0;
    }

    .success-msg {
      width: 100%;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
    }

    .phone-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-shadow {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1.02 / 1;
      border-radius: 44px;
      background: radial-gradient(circle at top, rgba(106,168,255,0.18), rgba(106,168,255,0.03) 55%, transparent 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .phone {
      width: min(390px, 100%);
      background: #040507;
      border-radius: 42px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 28px 80px rgba(0,0,0,0.48);
    }

    .notch {
      width: 152px;
      height: 28px;
      margin: 0 auto;
      border-radius: 0 0 20px 20px;
      background: #040507;
    }

    .screen {
      background: linear-gradient(180deg, #0d1118 0%, #0a0d14 100%);
      border-radius: 30px;
      min-height: 720px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .screen-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .screen-top strong {
      font-size: 16px;
      font-weight: 700;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(106,168,255,0.12);
      border: 1px solid rgba(106,168,255,0.18);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .screen-body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 18px;
    }

    .hero-card-label {
      color: #7f88a0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-card-title {
      font-size: 26px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .hero-card-copy {
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted);
    }

    .detail-grid {
      display: grid;
      gap: 10px;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 15px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .detail-row span {
      color: #7f88a0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 2px;
    }

    .detail-row strong {
      text-align: right;
      font-size: 14px;
      line-height: 1.55;
      max-width: 64%;
      font-weight: 600;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .status {
      border-radius: 18px;
      padding: 14px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .status span {
      display: block;
      color: #7f88a0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status strong {
      font-size: 14px;
      line-height: 1.45;
      display: block;
    }

    .status.terms strong { color: var(--accent); }
    .status.reminders strong { color: var(--warning); }
    .status.settlement strong { color: var(--green); }

    .home {
      width: 120px;
      height: 6px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: #131313;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 44px;
        text-align: center;
      }

      .subhead {
        margin-left: auto;
        margin-right: auto;
      }

      .waitlist {
        justify-content: center;
        margin-left: auto;
        margin-right: auto;
      }

      .note,
      .success-msg {
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 22px 18px 48px;
      }

      h1 {
        font-size: 44px;
      }

      .subhead {
        font-size: 17px;
      }

      .waitlist {
        flex-direction: column;
      }

      .waitlist input,
      .waitlist button {
        width: 100%;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .detail-row {
        flex-direction: column;
      }

      .detail-row strong {
        max-width: 100%;
        text-align: left;
      }

      .screen {
        min-height: 660px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a class="brand" href="/">
        <img src="/bull-skull-logo.png" alt="SideAction logo" />
        <span>Side<span class="accent">Action</span></span>
      </a>
    </nav>

    <main class="hero">
      <section>
        <div class="eyebrow">BET | TRACK | SHARE | COLLECT</div>
        <h1>Track the action. Follow the story. <span class="accent">Know who actually pays.</span></h1>
        <p class="subhead">Where legendary bets live forever.</p>

        <form class="waitlist js-waitlist-form" action="https://sideactionapp.us7.list-manage.com/subscribe/post?u=c5cd13a3e0e302822388b1690&amp;id=30e9236f91&amp;f_id=0085dee3f0" method="post" target="mailchimp-hidden-frame" novalidate data-success-message="You are on the beta waitlist. Watch your inbox for the next invite wave.">
          <input type="email" name="EMAIL" required placeholder="Enter your email" aria-label="Email address for beta signup" autocomplete="email" inputmode="email" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="go">
          <input type="hidden" name="MMERGE6" value="hero-minimal-visual">
          <input type="hidden" name="MMERGE7" value="side-deals">
          <button type="submit">Join waitlist</button>
          <div aria-hidden="true" style="position:absolute;left:-5000px;">
            <input type="text" name="b_c5cd13a3e0e302822388b1690_30e9236f91" tabindex="-1" value="">
          </div>
          <p class="success-msg" aria-live="polite"></p>
        </form>

       
      </section>
<section class="phone-wrap" aria-label="SideAction app preview">
  <img
    src="SideAction%20Bradon%20Dunks.png"
    alt="SideAction app preview"
    style="display:block; width:100%; max-width:420px; height:auto; margin:0 auto;"
  />
</section>
      </section>
    </main>
  </div>

  <iframe name="mailchimp-hidden-frame" title="Mailchimp subscription target" style="display:none;width:0;height:0;border:0;"></iframe>

  <script>
    (function () {
      const forms = document.querySelectorAll('.js-waitlist-form');
      const hiddenFrame = document.querySelector('iframe[name="mailchimp-hidden-frame"]');
      let activeForm = null;
      let responseHandled = false;
      let responseTimer = null;

      const showMessage = (form, message, type) => {
        if (!form) return;
        const msg = form.querySelector('.success-msg');
        if (!msg) return;
        msg.textContent = message;
        msg.style.color = type === 'error' ? '#ff8f8f' : '#2dd287';
      };

      forms.forEach((form) => {
        form.addEventListener('submit', () => {
          activeForm = form;
          responseHandled = false;
          if (responseTimer) clearTimeout(responseTimer);
          showMessage(form, '', 'success');
          responseTimer = window.setTimeout(() => {
            if (!responseHandled && activeForm === form) {
              showMessage(form, form.dataset.successMessage || 'You are on the beta waitlist. Watch your inbox for the next invite wave.', 'success');
            }
          }, 2500);
        });
      });

      hiddenFrame?.addEventListener('load', () => {
        if (!activeForm || responseHandled) return;
        responseHandled = true;
        if (responseTimer) clearTimeout(responseTimer);
        showMessage(activeForm, activeForm.dataset.successMessage || 'You are on the beta waitlist. Watch your inbox for the next invite wave.', 'success');
      });
    })();
  </script>
</body>
</html>
